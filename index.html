<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Tomomi's To-Do</title>
        <link rel="stylesheet" href="styles.css">
        <link rel="icon" type="image/x-icon" href="/assets/tomomi-icon.png">
    </head>
    <body>
        <h1>Tomomi's To-Do</h1>
        <div class="wrapper">
            <form>
                <input id="to-do-input" type="text" placeholder="Add a new task" autocomplete="off">
                <button id="add-btn" type="submit">Add</button>
            </form>
            <ul id="to-do-list">
                <li class="to-do">
                    <input type="checkbox" id="to-do-1">
                    <label class="custom-checkbox" for="to-do-1">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>
                    </label>
                    <label for="to-do-1" class="to-do-text">
                        Finish projects and then work on French
                    </label>
                    <button class="delete-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
                    </button>
                </li>
                <li class="to-do">
                    <input type="checkbox" id="to-do-2">
                    <label class="custom-checkbox" for="to-do-2">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M382-240 154-468l57-57 171 171 367-367 57 57-424 424Z"/></svg>
                    </label>
                    <label for="to-do-2" class="to-do-text">
                        Finish projects and then work on French
                    </label>
                    <button class="delete-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" height="24px" viewBox="0 -960 960 960" width="24px" fill="#000000"><path d="M280-120q-33 0-56.5-23.5T200-200v-520h-40v-80h200v-40h240v40h200v80h-40v520q0 33-23.5 56.5T680-120H280Zm400-600H280v520h400v-520ZM360-280h80v-360h-80v360Zm160 0h80v-360h-80v360ZM280-720v520-520Z"/></svg>
                    </button>
                </li>
            </ul>
        </div>
    </body>
</html>
